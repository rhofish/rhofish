<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>ruoo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <canvas id="particles"></canvas>

    <div class="wrapper">
      <div class="card" id="mainCard">
        <button class="card-close" id="closeBtn" aria-label="关闭">
          &times;
        </button>
        <div class="card-header">
          <p class="card-domain">ruoo.top</p>
        </div>
        <hr class="card-divider" />
        <div class="card-body">
          <p class="card-title">海内存知己，天涯若比邻</p>
        </div>
      </div>
    </div>

    <script type="module" src="./particles.js"></script>

    <script>
      // 关闭按钮 - 隐藏卡片
      (function () {
        const closeBtn = document.getElementById("closeBtn");
        const card = document.getElementById("mainCard");
        if (!closeBtn || !card) return;

        closeBtn.addEventListener("click", (ev) => {
          ev.stopPropagation(); // 阻止触发卡片的点击波纹
          card.classList.add("hidden");
          // 动画结束后隐藏
          card.addEventListener(
            "animationend",
            () => {
              card.style.display = "none";
            },
            { once: true }
          );
        });
      })();

      // 点击波纹效果
      (function () {
        const card = document.querySelector(".card");
        card.addEventListener("mousedown", (ev) => {
          const dot = document.createElement("i");
          dot.classList.add("dot");
          const rect = card.getBoundingClientRect();
          dot.style.left = `${ev.clientX - rect.left}px`;
          dot.style.top = `${ev.clientY - rect.top}px`;
          card.appendChild(dot);
          setTimeout(() => {
            card.removeChild(dot);
          }, 1000);
        });
      })();
    </script>
  </body>
</html>
